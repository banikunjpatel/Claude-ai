name: "Web — Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "championkids-web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "championkids-web/**"
      - ".github/workflows/web.yml"

defaults:
  run:
    working-directory: championkids-web

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: Install, lint, type-check, and build the Vite React app.
  #         Produces a dist/ artifact that the deploy job can use directly,
  #         avoiding a redundant second build on deploy.
  # ──────────────────────────────────────────────────────────────────────────────
  build-and-lint:
    name: "Build & Lint"
    runs-on: ubuntu-latest

    env:
      # Injected at build time by Vite — must match names used in import.meta.env
      VITE_API_BASE_URL: https://api.championkids.app
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_ENVIRONMENT: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Cache node_modules keyed on the lockfile. Using package-lock.json
      # means the cache is invalidated whenever any dependency changes.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: championkids-web/node_modules
          key: ${{ runner.os }}-web-node-${{ hashFiles('championkids-web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-web-node-

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      # Upload the built dist/ folder as an artifact so the deploy job can
      # download it directly rather than re-running the build.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: championkids-web/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy the pre-built artifact to Vercel.
  #         Runs only on push to main (not on PRs) after the build passes.
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: "Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the artifact built in the previous job — no rebuild needed.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: championkids-web/dist/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull Vercel project settings (vercel.json, env linkage) into .vercel/
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Build the Vercel output format using the pre-downloaded dist
      - name: Build Vercel output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy the pre-built output — --prebuilt skips a second Vercel build
      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
